<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lincoln Square Music — Coming Soon</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..600&family=Inter:wght@300..600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111111;
    --body: #3a3a3a;
    --muted: #767676;
    --line: rgba(17,17,17,0.14);
    --line-strong: rgba(17,17,17,0.6);
    --serif: "Newsreader", "Times New Roman", serif;
    --sans: "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: #ffffff;
    background-image:
      radial-gradient(120% 80% at 15% 0%, #f6f6f6 0%, rgba(246,246,246,0) 55%),
      radial-gradient(110% 90% at 100% 100%, #f1f1f1 0%, rgba(241,241,241,0) 50%);
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }

  .page {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 40px clamp(24px, 6vw, 80px);
  }

  /* ── Wordmark ── */
  .brand {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .brand .mark {
    font-size: 13px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink);
  }
  .brand .sub {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Hero ── */
  .hero {
    align-self: center;
    text-align: center;
    max-width: 980px;
    margin: 0 auto;
    padding: 48px 0;
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.02;
    margin: 0;
    font-size: clamp(48px, 8.5vw, 116px);
    color: var(--ink);
  }
  .hero h1 em {
    font-style: italic;
  }
  .hero p {
    font-family: var(--serif);
    font-size: clamp(17px, 2.2vw, 22px);
    line-height: 1.55;
    color: var(--body);
    max-width: 560px;
    margin: 28px auto 0;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 40px;
    padding: 15px 26px;
    border: 1px solid var(--line-strong);
    background: transparent;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    text-decoration: none;
    transition: background 160ms ease, color 160ms ease;
  }
  .cta:hover { background: var(--ink); color: #fff; }

  /* ── Subscribe footer ── */
  .footer {
    border-top: 1px solid var(--line);
    padding-top: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }
  .subscribe {
    display: flex;
    align-items: center;
    gap: clamp(16px, 3vw, 36px);
    flex: 1 1 420px;
  }
  .subscribe .label {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1;
    color: var(--ink);
    white-space: nowrap;
  }
  .form {
    display: flex;
    align-items: stretch;
    gap: 0;
    flex: 1 1 auto;
    max-width: 540px;
  }
  .form input {
    flex: 1 1 auto;
    min-width: 0;
    border: 1px solid var(--line-strong);
    border-right: none;
    background: #fff;
    padding: 0 18px;
    height: 52px;
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
    outline: none;
  }
  .form input::placeholder { color: #9a9a9a; }
  .form input:focus { border-color: var(--ink); }
  .form button {
    flex: 0 0 auto;
    height: 52px;
    padding: 0 28px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: #fff;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
  }
  .form button:hover { background: #fff; color: var(--ink); }
  .form.done input { border-color: var(--line); color: var(--muted); }

  .contact {
    font-size: 13px;
    color: var(--body);
    text-align: right;
    line-height: 1.7;
    flex: 0 0 auto;
  }
  .contact .k {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .contact a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
  .contact a:hover { border-color: var(--ink); }

  .note {
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--muted);
    min-height: 16px;
    flex-basis: 100%;
  }

  .copyright {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    flex-basis: 100%;
    text-align: center;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    margin-top: 8px;
  }

  @media (max-width: 720px) {
    .footer { flex-direction: column; align-items: flex-start; }
    .subscribe { flex-direction: column; align-items: flex-start; gap: 16px; width: 100%; }
    .form { max-width: none; width: 100%; }
    .contact { text-align: left; }
  }
</style>
</head>
<body>
  <main class="page">
    <header class="brand">
      <div class="mark">Lincoln Square Music</div>
      <div class="sub">LLC · New York</div>
    </header>

    <section class="hero">
      <h1>Great things,<br /><em>coming soon.</em></h1>
      <p>A New York talent &amp; management agency for a small, deliberate roster of artists. Our full site is on the way.</p>
      <a class="cta" href="mailto:info@lincolnsquaremusic.nyc">Contact us →</a>
    </section>

    <footer class="footer">
      <div class="subscribe">
        <div class="label">Subscribe</div>
        <form class="form" id="signup">
          <input type="email" id="email" name="email" placeholder="Email address" required aria-label="Email address" />
          <button type="submit">Sign up</button>
        </form>
        <div class="note" id="note"></div>
      </div>
      <div class="contact">
        <span class="k">Inquiries</span>
        <a href="mailto:info@lincolnsquaremusic.nyc">info@lincolnsquaremusic.nyc</a>
      </div>
      <div class="copyright">Lincoln Square Music, LLC &copy;2026</div>
    </footer>
  </main>

  <script>
    (function () {
      // Paste your Google Apps Script Web App URL here after deploying
      var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw83S-0FeTbRaPyrqO2XeJQUvu0Rb4bqhsKzhQjRcnZvoePlSwVZ0RwrUdmLE-6kj6g/exec';

        var form = document.getElementById('signup');
        var input = document.getElementById('email');
        var btn = form.querySelector('button');
        var note = document.getElementById('note');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = (input.value || '').trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          note.textContent = 'Please enter a valid email address.';
          input.focus();
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Saving…';
        note.textContent = '';

        fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ email: email, timestamp: new Date().toISOString() })
        })
        .then(function () {
          form.classList.add('done');
          input.value = '';
          input.placeholder = 'You're on the list';
          btn.textContent = 'Sign up';
          btn.disabled = false;
          note.textContent = 'Thanks — we'll be in touch when we launch.';
        })
        .catch(function () {
          btn.textContent = 'Sign up';
          btn.disabled = false;
          note.textContent = 'Something went wrong — please try again.';
        });
      });
    })();
  </script>
</body>
</html>
